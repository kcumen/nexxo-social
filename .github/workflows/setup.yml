name: Setup repository and project

on:
  create:
    # Solo ejecutar cuando se crea desde template o nuevo repo
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create project board
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_PAT }}
          script: |
            const projectName = context.repo.repo;
            
            // Crear proyecto en la organización
            const project = await github.rest.projects.createForOrg({
              org: 'kcumen',
              name: projectName,
              body: `Project board for ${projectName}`
            });
            
            console.log(`Project created: ${project.data.html_url}`);
            
            // Crear columnas estándar
            const columns = ['Todo', 'In Progress', 'Review', 'Done'];
            for (const columnName of columns) {
              await github.rest.projects.createColumn({
                project_id: project.data.id,
                name: columnName
              });
            }
            
            // Actualizar repo variable con el número de proyecto
            await github.rest.actions.createRepoVariable({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'PROJECT_NUMBER',
              value: project.data.number.toString()
            });
            
            console.log('Setup complete!');